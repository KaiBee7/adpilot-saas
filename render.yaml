services:
  - type: web
    name: adpilot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true        # Render generiert automatisch einen sicheren Zufallsstring
      - key: DATABASE_URL
        fromDatabase:
          name: adpilot-db
          property: connectionString

databases:
  - name: adpilot-db
    databaseName: adpilot
    user: adpilot
