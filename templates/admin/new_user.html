{% extends "base.html" %}
{% block title %}Benutzer anlegen{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('admin.index') }}"
       style="font-size:13px;color:var(--gray-500);text-decoration:none;display:block;margin-bottom:6px">
      ← Zurück zur Verwaltung
    </a>
    <h1>Neuen Benutzer anlegen</h1>
  </div>
</div>

<div style="max-width:560px">
<form method="POST">

  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span>Zugangsdaten</span></div>
    <div class="card-body">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="form-group">
          <label class="form-label">Vorname</label>
          <input type="text" name="first_name" class="form-control" placeholder="Max">
        </div>
        <div class="form-group">
          <label class="form-label">Nachname</label>
          <input type="text" name="last_name" class="form-control" placeholder="Mustermann">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">E-Mail-Adresse <span style="color:var(--danger)">*</span></label>
        <input type="email" name="email" class="form-control" required
               placeholder="max.mustermann@hofmann.info">
      </div>

      <div class="form-group">
        <label class="form-label">Passwort <span style="color:var(--danger)">*</span></label>
        <input type="password" name="password" class="form-control" required
               placeholder="Mindestens 8 Zeichen" minlength="8">
      </div>

    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span>Berechtigungen</span></div>
    <div class="card-body">

      <div class="form-group">
        <label class="form-label">Rolle</label>
        <select name="role" class="form-control" onchange="toggleNL(this.value)">
          {% for val, label in roles %}
          <option value="{{ val }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group" id="nl_select">
        <label class="form-label">Niederlassung</label>
        <select name="niederlassung_id" class="form-control">
          <option value="">– (Zugriff auf alle) –</option>
          {% for nl in niederlassungen %}
          <option value="{{ nl.id }}">{{ nl.name }} (KST-{{ nl.kostenstelle }})</option>
          {% endfor %}
        </select>
        <div style="font-size:12px;color:var(--gray-500);margin-top:4px">
          Niederlassungs-Logins sehen nur ihre eigenen Kampagnen
        </div>
      </div>

    </div>
  </div>

  <div style="display:flex;gap:12px;justify-content:flex-end">
    <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Abbrechen</a>
    <button type="submit" class="btn btn-primary">👤 Benutzer anlegen</button>
  </div>

</form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleNL(role) {
  document.getElementById('nl_select').style.display = (role === 'admin') ? 'none' : '';
}
</script>
{% endblock %}
