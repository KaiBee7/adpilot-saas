<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort vergessen – Adynex</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { background: linear-gradient(135deg,#003087 0%,#1E4D8C 50%,#2563EB 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .auth-card { background:#fff; border-radius:16px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-logo-icon { width:56px; height:56px; background:#003087; border-radius:14px; display:inline-flex; align-items:center; justify-content:center; font-size:1.6rem; margin-bottom:12px; }
    .auth-logo h1 { font-size:1.5rem; font-weight:800; color:#003087; margin:0; }
    .auth-logo p { color:#6B7280; font-size:0.875rem; margin-top:4px; }
    .form-group { margin-bottom:18px; }
    label { display:block; font-size:0.8rem; font-weight:600; color:#374151; margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase; }
    input { width:100%; padding:10px 14px; border:1.5px solid #E5E7EB; border-radius:8px; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    input:focus { border-color:#003087; }
    .btn { width:100%; padding:12px; background:#003087; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:8px; }
    .btn:hover { background:#1E4D8C; }
    .auth-link { text-align:center; margin-top:20px; font-size:0.875rem; color:#6B7280; }
    .auth-link a { color:#003087; font-weight:600; }
    .alert { padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:0.875rem; }
    .alert-success { background:#DCFCE7; color:#166534; }
    .alert-error { background:#FEE2E2; color:#991B1B; }
    .alert-info { background:#E0F2FE; color:#075985; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">🎯</div>
    <h1>Adynex</h1>
    <p>Passwort zurücksetzen</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <p style="font-size:0.875rem;color:#6B7280;margin-bottom:20px;line-height:1.6">
    Gib deine E-Mail-Adresse ein. Du erhältst einen Link um dein Passwort zurückzusetzen.
  </p>

  <form method="POST">
    <div class="form-group">
      <label>E-Mail-Adresse</label>
      <input type="email" name="email" required autofocus placeholder="deine@email.de">
    </div>
    <button type="submit" class="btn">Reset-Link senden →</button>
  </form>

  <div class="auth-link">
    <a href="{{ url_for('auth.login') }}">← Zurück zum Login</a>
  </div>
</div>
</body>
</html>
